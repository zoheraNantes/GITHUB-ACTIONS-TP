name: CI
 
on:
    push:
        branches: [main]
   

 
jobs:
    quality:
        runs-on: ubuntu-latest
 
        steps:
            - name: Checkout #copie le code sur la vm
              uses: actions/checkout@v4
           
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: 'npm'
 
            - name: Install dependencies
              run: npm ci #installe les dependances depuis le package-lock.json
 
            - name: Lint
              run: npm run lint
 
            - name: Test
              run: npm run test
           
            - name: Upload coverage
              uses: actions/upload-artifact@v4
              with:
                name: coverage-report
                path: coverage/
                retention-days: 7
 
            - name: Verify secret is available
              env:
                API_KEY: ${{ secrets.API_KEY }}
              run: |
                if [ -z "$API_KEY" ]; then
                    echo "Secret manquant"
                    exit 1
                fi
                echo "Secret disponible (valeur masquée par GitHub)"